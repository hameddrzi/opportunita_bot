name: Send Telegram Report

on:
  push:
    branches: [master]
    paths:
      - 'reports/**.md'

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Send report to Telegram
        run: |
          LATEST=$(ls reports/*.md 2>/dev/null | sort | tail -1)
          if [ -z "$LATEST" ]; then
            echo "No report found"
            exit 0
          fi
          CONTENT=$(cat "$LATEST" | head -c 4000)
          curl -s -X POST \
            "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\": \"5134844472\", \"text\": $(echo "$CONTENT" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}"
